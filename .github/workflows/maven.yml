# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [main]
    tags:
      - 'v*' 
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine image tag and if the image should be pushed
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Strip the leading 'v' → v1.2.3 becomes 1.2.3
            RELEASE_TAG="${GITHUB_REF_NAME#v}"
            echo "tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
            echo "extra_tag=latest" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "push=true" >> $GITHUB_OUTPUT
            echo "extra_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT
            echo "push=false" >> $GITHUB_OUTPUT
            echo "extra_tag=" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: steps.tag.outputs.push == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Build with Maven
        run: mvn -B package -Dmaven.test.skip=true --file pom.xml
        env:
            QUARKUS_CONTAINER_IMAGE_NAME: nextcloudmcp
            QUARKUS_CONTAINER_IMAGE_TAG: ${{ steps.tag.outputs.tag }}
            QUARKUS_CONTAINER_IMAGE_ADDITIONAL_TAGS: ${{ steps.tag.outputs.extra_tag }}
            QUARKUS_CONTAINER_IMAGE_BUILD: true
            QUARKUS_CONTAINER_IMAGE_PUSH:  ${{ steps.tag.outputs.push }}
            QUARKUS_CONTAINER_IMAGE_GROUP: ${{ secrets.DOCKER_USERNAME }}
            QUARKUS_CONTAINER_IMAGE_REGISTRY:  docker.io
            QUARKUS_CONTAINER_IMAGE_USERNAME: ${{ secrets.DOCKER_USERNAME }}
            QUARKUS_CONTAINER_IMAGE_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
            QUARKUS_DOCKER_BUILDX_PLATFORM: linux/amd64,linux/arm64